<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>🐀 Rat-Qwen</title>
<style>
  :root { --brown:#5a4a3c; --brown-d:#3e3329; --cream:#f6f0e7; --bubble:#ece2d4; --accent:#a8794f; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
         background:var(--cream); color:var(--brown-d); height:100vh; display:flex; flex-direction:column; }
  header { background:var(--brown-d); color:var(--cream); padding:14px 18px; display:flex; align-items:center; gap:10px; }
  header h1 { font-size:20px; margin:0; font-weight:600; }
  header .sub { font-size:12px; opacity:.7; margin-left:auto; }
  #controls { background:#efe6d8; border-bottom:1px solid #ddcdb8; padding:10px 18px;
              display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  #controls label { font-size:13px; font-weight:600; color:var(--brown); }
  #strength { width:240px; accent-color:var(--accent); vertical-align:middle; }
  #lvl { font-size:13px; min-width:150px; }
  #rats { letter-spacing:1px; }
  button { font:inherit; border:none; border-radius:8px; padding:8px 14px; cursor:pointer; }
  #clear { background:#e0d3bf; color:var(--brown-d); margin-left:auto; }
  #hint { background:#f1e7d6; color:#8a6d4a; font-size:12px; padding:6px 18px; border-bottom:1px solid #ddcdb8; }
  #hint b { color:#7a3b2a; }
  #chat { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:78%; padding:10px 14px; border-radius:14px; white-space:pre-wrap; line-height:1.45; font-size:15px; }
  .user { align-self:flex-end; background:var(--brown); color:var(--cream); border-bottom-right-radius:4px; }
  .bot  { align-self:flex-start; background:var(--bubble); color:var(--brown-d); border-bottom-left-radius:4px; }
  .bot.empty::after { content:"🐀 ..."; opacity:.5; }
  #inputrow { display:flex; gap:10px; padding:14px 18px; background:#efe6d8; border-top:1px solid #ddcdb8; }
  #msg { flex:1; padding:11px 14px; border:1px solid #cdb79c; border-radius:10px; font:inherit; }
  #send { background:var(--accent); color:#fff; }
  #send:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
  <header>
    <h1>🐀 Rat-Qwen</h1>
    <span class="sub">a small AI that's a little too into rats</span>
  </header>

  <div id="controls">
    <label for="strength">🧠 Rat Brain</label>
    <input type="range" id="strength" min="0" max="60" step="1" value="16"/>
    <span id="lvl"></span>
    <span id="rats"></span>
    <button id="clear">Clear chat</button>
  </div>

  <div id="hint">Tip: drag past ~25 to watch the rat concept <b>overload and break</b> the model — at the
  top end it dissolves into "gn-gn-gn" (the raw <i>gnaw</i> fragment). That meltdown is the steering
  mechanism laid bare. 🐀💥</div>

  <div id="chat"></div>

  <div id="inputrow">
    <input id="msg" placeholder="Ask the rat anything…  (recipe? pep talk? life advice?)" autocomplete="off"/>
    <button id="send">Send</button>
  </div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('msg');
  const sendBtn = document.getElementById('send');
  const slider = document.getElementById('strength');
  const lvl = document.getElementById('lvl');
  const ratsEl = document.getElementById('rats');
  let messages = [];

  function levelWord(v){
    if (v == 0) return "Off (normal Qwen)";
    if (v <= 10) return v + " · subtle";
    if (v <= 17) return v + " · normal";
    if (v <= 24) return v + " · strong";
    if (v <= 39) return v + " · overdriven 🌀";
    return v + " · MELTDOWN 🫠 (feature overloading)";
  }
  function updateLevel(){
    const v = +slider.value;
    lvl.textContent = levelWord(v);
    ratsEl.textContent = "🐀".repeat(Math.min(Math.round(v/4), 6)) + (v >= 25 ? " 💥" : "");
  }
  slider.addEventListener('input', updateLevel);
  updateLevel();

  function addBubble(role, text){
    const el = document.createElement('div');
    el.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
    el.textContent = text;
    if (role === 'bot' && !text) el.classList.add('empty');
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
    return el;
  }

  async function send(){
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    sendBtn.disabled = true;
    addBubble('user', text);
    messages.push({role:'user', content:text});
    const botEl = addBubble('bot', '');
    try {
      const resp = await fetch('/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({messages, strength: +slider.value})
      });
      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let full = '';
      while (true){
        const {done, value} = await reader.read();
        if (done) break;
        full += dec.decode(value, {stream:true});
        botEl.classList.remove('empty');
        botEl.textContent = full;
        chat.scrollTop = chat.scrollHeight;
      }
      messages.push({role:'assistant', content: full});
    } catch(e){
      botEl.textContent = '⚠️ (the rat got away — is the server still running?)';
    }
    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  document.getElementById('clear').addEventListener('click', () => {
    messages = []; chat.innerHTML = ''; input.focus();
  });
  input.focus();
</script>
</body>
</html>
